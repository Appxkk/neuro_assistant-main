services:
  - type: web
    name: neuro-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AUTH_ENABLED
        value: true
      - key: AUTH_SECRET_KEY
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: true
      - key: AUTH_SESSION_MAX_AGE
        value: 86400
      - key: LLM_PROVIDER
        value: hybrid
      - key: LOCAL_PARSER_ENABLED
        value: true
      - key: OLLAMA_ENABLED
        value: false
      - key: OLLAMA_URL
        value: ""
      - key: OLLAMA_MODEL
        value: ""
      - key: OLLAMA_TIMEOUT
        value: 8
      - key: CLOUD_LLM_ENABLED
        value: true
      - key: CLOUD_LLM_PROVIDER
        value: openrouter
      - key: CLOUD_LLM_API_KEY
        sync: false
      - key: CLOUD_LLM_MODEL
        value: openrouter/free
      - key: CLOUD_LLM_TIMEOUT
        value: 12
      - key: CLOUD_LLM_TITLE
        value: Neuro Assistant
      - key: TELEGRAM_POLLING_ENABLED
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
